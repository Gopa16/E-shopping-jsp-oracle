<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Product</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; }
    form { width:400px; margin:100px auto; padding:20px; background:#fff; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    label { display:block; margin-top:10px; font-weight:bold; }
    input[type=number] { width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:4px; }
    input[type=submit] { margin-top:15px; padding:10px; width:100%; background:#333; color:#fff; border:none; border-radius:4px; cursor:pointer; }
    input[type=submit]:hover { background:#555; }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Delete Product</h2>
  <form action="deleteProduct" method="post">
    <label for="id">Enter Product ID:</label>
    <input type="number" name="id" required>
    <input type="submit" value="Delete">
  </form>
</body>
</html>
